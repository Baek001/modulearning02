spring.application.name=Starworks-groupware
spring.output.ansi.enabled=always


# dataSource \uc124\uc815
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
app.jobs.board-workspace.enabled=${APP_JOBS_BOARD_WORKSPACE_ENABLED:true}
app.jobs.attendance.enabled=${APP_JOBS_ATTENDANCE_ENABLED:true}


# mybatis(data mapper) \uc124\uc815
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=null
mybatis.type-aliases-package=kr.or.ddit.vo
mybatis.mapper-locations=classpath*:/kr/or/ddit/mybatis/mapper/**/*.xml


# p6spy \ub97c \ube44\ub86f\ud55c \ub85c\uadf8 \uc124\uc815
logging.pattern.console=%clr([%d{HH:mm:ss.SSS}]){magenta} %clr([%-5level]) [%thread] %clr(%logger{5}){cyan} %msg%n
logging.level.kr.or.ddit=${APP_LOG_LEVEL:info}
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=${REQUEST_MAPPING_LOG_LEVEL:warn}
logging.level.org.springframework.web.servlet=${SPRING_WEB_LOG_LEVEL:warn}
logging.level.org.springframework.web.servlet.view=${SPRING_VIEW_LOG_LEVEL:warn}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:info}
logging.level.p6spy=${P6SPY_LOG_LEVEL:warn}

decorator.datasource.p6spy.enable-logging=${P6SPY_ENABLED:false}
decorator.datasource.p6spy.multiline=${P6SPY_MULTILINE:false}

logging.level.org.springframework.ai=${SPRING_AI_LOG_LEVEL:warn}
spring.autoconfigure.exclude=org.springframework.ai.model.vertexai.autoconfigure.embedding.VertexAiTextEmbeddingAutoConfiguration,org.springframework.ai.model.vertexai.autoconfigure.embedding.VertexAiMultiModalEmbeddingAutoConfiguration,org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiChatAutoConfiguration


# \ub0b4\uc7a5 \uc11c\ubc84 \uc124\uc815
server.port=${SERVER_PORT:18080}
server.address=${SERVER_ADDRESS:0.0.0.0}
server.error.whitelabel.enabled=false
server.error.path=/error
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:framework}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true


# MVC \ubdf0 \uc124\uc815
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp


#CORS \uc0ac\uc6a9\uc790 \uc815\uc758 \uc124\uc815
cors.allow-origins=${CORS_ALLOW_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
cors.allow-methods=GET,POST,PUT,DELETE,PATCH
cors.allow-headers=*
cors.rest-uri=/**


# \ud30c\uc77c \uad00\ub828 (\uac00\uc601 \ucd94\uac00)
# file-info.board-path=file:C:/starworks_medias/board/
file-info.file.url=${FILE_STORAGE_URL:/starworks_medias}
file-info.file.path=${FILE_STORAGE_PATH:file:C:/starworks_medias/}
file-info.storage-mode=${FILE_STORAGE_MODE:s3}
# file-info.file-path=${user.dir}/atchFiles/
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
cloud.aws.s3.bucket=${AWS_BUCKET:}
cloud.aws.endpoint=${AWS_ENDPOINT:}
cloud.aws.public-base-url=${AWS_PUBLIC_BASE_URL:}
cloud.aws.path-style-access=${AWS_PATH_STYLE_ACCESS:false}


