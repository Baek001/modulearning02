# JWT sign key, oath2 \uad00\ub828 \uc124\uc815. (\ud604\ud0dd \ucd94\uac00)
jwt.sign-key=${JWT_SECRET_KEY}
spring.security.oauth2.resourceserver.jwt.authority-prefix=
app.cookie.domain=${COOKIE_DOMAIN:}
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Strict}
app.cookie.max-age=${COOKIE_MAX_AGE:86400}
app.signup.turnstile.enabled=${SIGNUP_TURNSTILE_ENABLED:false}
app.signup.turnstile.site-key=${SIGNUP_TURNSTILE_SITE_KEY:}
app.signup.turnstile.secret-key=${SIGNUP_TURNSTILE_SECRET_KEY:}
app.signup.rate-limit.ip.max-attempts=${SIGNUP_RATE_LIMIT_IP_MAX_ATTEMPTS:10}
app.signup.rate-limit.ip.window-seconds=${SIGNUP_RATE_LIMIT_IP_WINDOW_SECONDS:600}
app.signup.rate-limit.email.max-attempts=${SIGNUP_RATE_LIMIT_EMAIL_MAX_ATTEMPTS:5}
app.signup.rate-limit.email.window-seconds=${SIGNUP_RATE_LIMIT_EMAIL_WINDOW_SECONDS:3600}
app.signup.rate-limit.slug.max-attempts=${SIGNUP_RATE_LIMIT_SLUG_MAX_ATTEMPTS:5}
app.signup.rate-limit.slug.window-seconds=${SIGNUP_RATE_LIMIT_SLUG_WINDOW_SECONDS:3600}


# \ud30c\uc77c \uc5c5\ub85c\ub4dc \uc6a9\ub7c9 \uc81c\ud55c \uc124\uc815(\uc11c\ud604 \ucd94\uac00)
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
